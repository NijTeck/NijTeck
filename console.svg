<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 632" width="840" height="632" role="img" aria-label="Leonard Esere terminal manifesto">
  <title>leonard@nijteck: ~/manifesto</title>
  <style>
    text { font: 15px ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; fill: #8b949e; }
    .title { font-size: 12.5px; fill: #8b949e; }
    .p { fill: #7ee787; }
    .c { fill: #e6edf3; }
    .w { fill: #f0f6fc; font-weight: 600; }
    .org { fill: #d29922; font-weight: 600; }
    .blue { fill: #58a6ff; font-weight: 600; }
    .purple { fill: #bc8cff; font-weight: 600; }
    .ok { fill: #3fb950; font-weight: 600; }
    .cmt { fill: #6e7681; font-style: italic; }
  </style>

  <!-- window chrome -->
  <rect x="1" y="1" width="838" height="630" rx="13" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M1,14 Q1,1 14,1 H826 Q839,1 839,14 V45 H1 Z" fill="#161b22"/>
  <line x1="1" y1="45" x2="839" y2="45" stroke="#30363d" stroke-width="1"/>
  <circle cx="26" cy="23" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="23" r="6" fill="#febc2e"/>
  <circle cx="70" cy="23" r="6" fill="#28c840"/>
  <text x="420" y="28" text-anchor="middle" class="title">leonard@nijteck: ~/manifesto</text>

  <!-- === $ whoami === -->
  <g opacity="0">
    <text x="26" y="84" class="c"><tspan class="p">$</tspan> whoami</text>
    <set attributeName="opacity" to="1" begin="0.4s"/>
  </g>
  <g opacity="0">
    <text x="26" y="108">leonard esere · dallas-fort worth · 13 years in tech</text>
    <set attributeName="opacity" to="1" begin="1.2s"/>
  </g>

  <!-- === $ cat experience.log === -->
  <g opacity="0">
    <text x="26" y="140" class="c"><tspan class="p">$</tspan> cat experience.log</text>
    <set attributeName="opacity" to="1" begin="1.8s"/>
  </g>
  <g opacity="0">
    <text x="26" y="164"><tspan class="org">los alamos national laboratory</tspan><tspan x="310">zero trust for mission-critical government cloud</tspan></text>
    <set attributeName="opacity" to="1" begin="2.8s"/>
  </g>
  <g opacity="0">
    <text x="26" y="188"><tspan class="org">mitre</tspan><tspan x="310">federally funded r&amp;d · national security systems</tspan></text>
    <set attributeName="opacity" to="1" begin="3.4s"/>
  </g>
  <g opacity="0">
    <text x="26" y="212"><tspan class="org">frontier airlines</tspan><tspan x="310">azure for 1M+ daily passengers · 42% cloud cost cut</tspan></text>
    <set attributeName="opacity" to="1" begin="4.0s"/>
  </g>

  <!-- === $ cat diagnosis.log === -->
  <g opacity="0">
    <text x="26" y="244" class="c"><tspan class="p">$</tspan> cat diagnosis.log</text>
    <set attributeName="opacity" to="1" begin="4.8s"/>
  </g>
  <g opacity="0">
    <text x="26" y="268">dashboards alert. engineers burn out. nothing gets fixed.</text>
    <set attributeName="opacity" to="1" begin="5.8s"/>
  </g>
  <g opacity="0">
    <text x="26" y="292" class="w">root cause: the tools are the problem.</text>
    <set attributeName="opacity" to="1" begin="6.6s"/>
  </g>

  <!-- === $ ls ~/the-fix === -->
  <g opacity="0">
    <text x="26" y="324" class="c"><tspan class="p">$</tspan> ls ~/the-fix</text>
    <set attributeName="opacity" to="1" begin="7.4s"/>
  </g>
  <g opacity="0">
    <text x="26" y="348"><tspan class="blue">policycortex/</tspan><tspan x="161">founder · autonomous cloud governance · predict. enforce. prove.</tspan></text>
    <set attributeName="opacity" to="1" begin="8.3s"/>
  </g>
  <g opacity="0">
    <text x="26" y="372"><tspan class="purple">orbitra/</tspan><tspan x="161">co-founder + cto · identity threats contained in under 60s</tspan></text>
    <set attributeName="opacity" to="1" begin="9.1s"/>
  </g>

  <!-- === $ cat github.stats === -->
  <g opacity="0">
    <text x="26" y="404" class="c"><tspan class="p">$</tspan> cat github.stats</text>
    <set attributeName="opacity" to="1" begin="9.9s"/>
  </g>
  <g opacity="0">
    <text x="26" y="428">92% commits. the code does the talking here.</text>
    <set attributeName="opacity" to="1" begin="10.8s"/>
  </g>

  <!-- === $ echo $CLEARANCES === -->
  <g opacity="0">
    <text x="26" y="460" class="c"><tspan class="p">$</tspan> echo $CLEARANCES</text>
    <set attributeName="opacity" to="1" begin="11.6s"/>
  </g>
  <g opacity="0">
    <text x="26" y="484">DoD Secret · DoE Q</text>
    <set attributeName="opacity" to="1" begin="12.6s"/>
  </g>

  <!-- === $ policycortex fix --all === -->
  <g opacity="0">
    <text x="26" y="516" class="c"><tspan class="p">$</tspan> policycortex fix --all</text>
    <set attributeName="opacity" to="1" begin="13.4s"/>
  </g>
  <g opacity="0">
    <text x="26" y="540"><tspan class="ok">✓</tspan><tspan x="44">3 risks found · 3 fixed · 0 alerts raised · 0 dashboards opened</tspan></text>
    <set attributeName="opacity" to="1" begin="14.7s"/>
  </g>

  <!-- === comment + cursor === -->
  <g opacity="0">
    <text x="26" y="572" class="cmt"># looking for another dashboard? wrong terminal.</text>
    <set attributeName="opacity" to="1" begin="15.6s"/>
  </g>

  <g opacity="0">
    <text x="26" y="596" class="p">$</text>
    <rect x="44" y="583" width="9" height="17" fill="#e6edf3">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" begin="16.4s"/>
    </rect>
    <set attributeName="opacity" to="1" begin="16.4s"/>
  </g>
</svg>
